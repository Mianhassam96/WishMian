<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#05050a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#fff0a0"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="spark1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)"/>
  <circle cx="16" cy="16" r="15" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14.5" stroke="#ffd700" stroke-opacity="0.2" stroke-width="0.5" fill="none"/>

  <!-- Main sparkle / star shape -->
  <!-- 4-point star -->
  <path d="M16 4 L17.2 14.8 L28 16 L17.2 17.2 L16 28 L14.8 17.2 L4 16 L14.8 14.8 Z"
        fill="url(#star)"
        opacity="0.95"/>

  <!-- Inner glow dot -->
  <circle cx="16" cy="16" r="2.5" fill="#fff" opacity="0.9"/>

  <!-- Small sparkles -->
  <circle cx="8" cy="8" r="1.2" fill="#a78bfa" opacity="0.8"/>
  <circle cx="24" cy="8" r="0.9" fill="#ffd700" opacity="0.7"/>
  <circle cx="8" cy="24" r="0.8" fill="#ffd700" opacity="0.6"/>
  <circle cx="24" cy="24" r="1.1" fill="#a78bfa" opacity="0.7"/>

  <!-- Tiny dots -->
  <circle cx="16" cy="6.5" r="0.6" fill="#fff" opacity="0.5"/>
  <circle cx="25.5" cy="16" r="0.6" fill="#fff" opacity="0.5"/>
  <circle cx="16" cy="25.5" r="0.6" fill="#fff" opacity="0.5"/>
  <circle cx="6.5" cy="16" r="0.6" fill="#fff" opacity="0.5"/>
</svg>
